<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{ url_for('static', filename = 'css/bootstrap.min.css') }}" rel="stylesheet">
    <title>Login</title>
</head>
<body>

    <div class="wrapper ">

        <nav class="navbar navbar-expand-sm navbar-light bg-success">
            <a class="navbar-brand" href="#">Login</a>
            <button class="navbar-toggler d-lg-none" type="button" data-toggle="collapse" data-target="#collapsibleNavId" aria-controls="collapsibleNavId"
                aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavId">
                <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
            </div>
        </nav>

        <div class="form container">
            <div class="row align-items-center justify-content-center" style="height: 80vh;">
                <div class="col-md-8">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    <form id="formLogin" action="{{ url_for('login') }}" method="post">
                        <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" name="username" id="username" autocomplete="username" placeholder="Masukkan username">
                        </div>
                        <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" name="password" id="password" autocomplete="current-password" placeholder="Masukkan password">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-success btn-block btn-login" type="submit">Masuk</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
    </div>
    
    <script src="{{ url_for('static', filename='js/jquery.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>

    <script>
        $(document).ready(function(){
            $('#formLogin').on('submit', function(e){
                e.preventDefault()
                let username = $("input[name='username']").val()
                let password = $("input[name='password']").val()

                if(!username){
                    alert('Username kosong!')
                    return
                }
                if(!password){
                    alert('Password kosong!')
                    return
                }

                e.currentTarget.submit()
            })
        })
    </script>

</body>
</html>
