<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{ url_for('static', filename = 'css/bootstrap.min.css') }}" rel="stylesheet">
    <title>Dashboard</title>
</head>
<body>

    <div class="wrapper">
        <nav class="navbar navbar-expand-sm navbar-dark bg-success">
            <a class="navbar-brand" href="#">Dashboard Manage Barang</a>
            <button class="navbar-toggler d-lg-none" type="button" data-toggle="collapse" data-target="#collapsibleNavId" aria-controls="collapsibleNavId"
                aria-expanded="false" aria-label="Toggle navigation"></button>
            <div class="collapse navbar-collapse" id="collapsibleNavId">
                <ul class="navbar-nav ml-auto mt-2 mt-lg-0">
                    <li class="nav-item active">
                        <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
                    </li>
                    <li class="nav-item">
                        <form action="{{ url_for('logout') }}" method="post" class="m-0 p-0">
                            <button type="submit" class="nav-link btn btn-link text-white">Logout from {{ current_user.nama }}</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="container">
            <div class="content pt-5">
                <h3 class="text-center">Tambah Barang</h3>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form id="formTambahBarang" action="{{ url_for('tambah_barang') }}" method="post">
                    <div class="form-group">
                        <label for="nama_barang">Nama barang</label>
                        <input type="text" class="form-control" name="nama_barang" id="nama_barang" placeholder="Contoh: Laptop" required>
                    </div>
                    <div class="form-group">
                        <label for="merk_barang">Merk barang</label>
                        <input type="text" class="form-control" name="merk_barang" id="merk_barang" placeholder="Contoh: Lenovo" required>
                    </div>
                    <div class="form-group">
                        <label for="stok_barang">Stok barang</label>
                        <input type="number" class="form-control" name="stok_barang" id="stok_barang" min="0" placeholder="0" required>
                    </div>
                    <div class="form-group">
                        <button class="btn btn-success btn-block btn-tambah" type="submit">Simpan</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/jquery.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>

    <script>
        $(document).ready(function(){
            $('#formTambahBarang').on('submit', function(e){
                e.preventDefault()
                let nama_barang = $("input[name='nama_barang']").val()
                let merk_barang = $("input[name='merk_barang']").val()
                let stok_barang = $("input[name='stok_barang']").val()

                if(!nama_barang){
                    alert('nama barang tidak boleh kosong!')
                    return
                }
                if(!merk_barang){
                    alert('Merk barang tidak boleh kosong!')
                    return
                }
                if(!stok_barang){
                    alert('Stok barang tidak boleh kosong!')
                    return
                }
                

                e.currentTarget.submit()
            })
        })
    </script>

</body>
</html>
